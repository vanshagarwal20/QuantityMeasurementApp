server:
  port: ${PORT:8082}

spring:
  application:
    name: qma-service

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/quantity_service_db}
    username: ${DB_USER:root}
    password: ${DB_PASS:1234}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  cache:
    type: ${CACHE_TYPE:none}

  main:
    allow-bean-definition-overriding: true

eureka:
  client:
    enabled: true
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: false
    hostname: ${RENDER_EXTERNAL_HOSTNAME:localhost}
    instance-id: ${RENDER_EXTERNAL_HOSTNAME:localhost}:${spring.application.name}:${PORT:8082}

jwt:
  secret: ${JWT_SECRET:QMASecretKey2024QMASecretKey2024QM}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha
    tryItOutEnabled: true
    filter: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always